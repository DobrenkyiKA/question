databaseChangeLog:
  - changeSet:
      id: 002-create-questions
      author: backend
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: key
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: prompt
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: difficulty
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

# SQL:
# CREATE TABLE questions (
#   id UUID PRIMARY KEY,
#   key VARCHAR(100) NOT NULL UNIQUE,
#   prompt TEXT NOT NULL,
#   difficulty VARCHAR(20) NOT NULL,
#   created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
#   updated_at TIMESTAMPTZ NOT NULL DEFAULT now()
# );