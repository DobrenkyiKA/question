databaseChangeLog:
  - changeSet:
      id: 001
      author: Konstantin Dobrenkii
      changes:
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true

              - column:
                  name: key
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: parent_id
                  type: UUID
                  constraints:
                    nullable: true

              - column:
                  name: path
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
                    unique: true

        - addForeignKeyConstraint:
            baseTableName: topics
            baseColumnNames: parent_id
            referencedTableName: topics
            referencedColumnNames: id
            constraintName: fk_topics_parent