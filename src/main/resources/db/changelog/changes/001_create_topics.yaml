databaseChangeLog:
  - changeSet:
      id: 001-create-topics
      author: Konstantin Dobrenkii
      changes:
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: key
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: uuid
                  constraints:
                    nullable: true
              - column:
                  name: path
                  type: varchar(500)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: topics
            baseColumnNames: parent_id
            referencedTableName: topics
            referencedColumnNames: id
            constraintName: fk_topics_parent

# SQL:
# CREATE TABLE topics (
#   id UUID PRIMARY KEY,
#   key VARCHAR(100) NOT NULL UNIQUE,
#   name VARCHAR(255) NOT NULL,
#   parent_id UUID,
#   path VARCHAR(500) NOT NULL,
#   CONSTRAINT fk_topics_parent FOREIGN KEY (parent_id)
#     REFERENCES topics(id)
# );