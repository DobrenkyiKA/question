databaseChangeLog:
  - changeSet:
      id: 001-create-topics
      author: Konstantin Dobrenkii
      changes:
        - createSequence:
            sequenceName: topics_id_sequence
            startValue: 1
            incrementBy: 50
            cacheSize: 50
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: id
                  type: BIGINT
              - column:
                  name: key
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: path
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: topics
            columnNames: id
            constraintName: pk_topics_id
        - addUniqueConstraint:
            tableName: topics
            columnNames: key
            constraintName: uq_topics_key
        - addForeignKeyConstraint:
            baseTableName: topics
            baseColumnNames: parent_id
            referencedTableName: topics
            referencedColumnNames: id
            constraintName: fk_topics_parent

# SQL:
# CREATE TABLE topics (
#   id UUID PRIMARY KEY,
#   key VARCHAR(100) NOT NULL UNIQUE,
#   name VARCHAR(255) NOT NULL,
#   parent_id UUID,
#   path VARCHAR(500) NOT NULL,
#   CONSTRAINT fk_topics_parent FOREIGN KEY (parent_id)
#     REFERENCES topics(id)
# );