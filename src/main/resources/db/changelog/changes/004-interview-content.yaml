
databaseChangeLog:
  - changeSet:
      id: 005-interview-content
      author: Konstantin Dobrenkii
      changes:
        - createSequence:
            sequenceName: interview_content_id_sequence
            startValue: 1
            incrementBy: 50
            cacheSize: 50
        - createTable:
            tableName: interview_content
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: short_answer
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: long_answer
                  type: TEXT

        - addForeignKeyConstraint:
            baseTableName: interview_content
            baseColumnNames: id
            referencedTableName: questions
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_interview_content_question

# SQL:
# CREATE TABLE interview_content (
#   question_id UUID PRIMARY KEY,
#   short_answer TEXT NOT NULL,
#   long_answer TEXT,
#   CONSTRAINT fk_interview_content_question
#     FOREIGN KEY (question_id) REFERENCES questions(id) ON DELETE CASCADE
# );