databaseChangeLog:
  - changeSet:
      id: 005
      author: Konstantin Dobrenkii
      changes:
        - createTable:
            tableName: answers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true

              - column:
                  name: presentation_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false

              - column:
                  name: correct
                  type: BOOLEAN
                  constraints:
                    nullable: false

              - column:
                  name: explanation
                  type: TEXT
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: answers
            baseColumnNames: presentation_id
            referencedTableName: presentations
            referencedColumnNames: id
            constraintName: fk_answers_presentation
            onDelete: CASCADE