databaseChangeLog:
  - changeSet:
      id: 009-indexes
      author: Konstantin Dobrenkii
      changes:
        - createIndex:
            indexName: idx_questions_key
            tableName: questions
            columns:
              - column:
                  name: key

        - createIndex:
            indexName: idx_questions_difficulty
            tableName: questions
            columns:
              - column:
                  name: difficulty

        - createIndex:
            indexName: idx_question_labels_label
            tableName: question_labels
            columns:
              - column:
                  name: label

        - createIndex:
            indexName: idx_quiz_content_question
            tableName: quiz_content
            columns:
              - column:
                  name: question_id

        - createIndex:
            indexName: idx_questions_topic
            tableName: questions
            columns:
              - column:
                  name: topic_id

        - createIndex:
            indexName: idx_topics_path
            tableName: topics
            columns:
              - column:
                  name: path

