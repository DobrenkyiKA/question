databaseChangeLog:
  - changeSet:
      id: 006
      author: Konstantin Dobrenkii
      changes:
        - createTable:
            tableName: learning_progress
            columns:
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: learning_item_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: learned_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: true

        - addPrimaryKey:
            tableName: learning_progress
            columnNames: user_id, learning_item_id
            constraintName: pk_learning_progress

        - addForeignKeyConstraint:
            baseTableName: learning_progress
            baseColumnNames: learning_item_id
            referencedTableName: learning_items
            referencedColumnNames: id
            constraintName: fk_lp_item
            onDelete: CASCADE

        - createIndex:
            tableName: learning_progress
            indexName: idx_lp_user
            columns:
              - column:
                  name: user_id