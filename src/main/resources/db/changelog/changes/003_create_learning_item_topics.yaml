databaseChangeLog:
  - changeSet:
      id: 004
      author: Konstantin Dobrenkii
      changes:
        - createTable:
            tableName: learning_item_topics
            columns:
              - column:
                  name: learning_item_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: topic_id
                  type: UUID
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: learning_item_topics
            columnNames: learning_item_id, topic_id
            constraintName: pk_learning_item_topics

        - addForeignKeyConstraint:
            baseTableName: learning_item_topics
            baseColumnNames: learning_item_id
            referencedTableName: learning_items
            referencedColumnNames: id
            constraintName: fk_lit_learning_item
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: learning_item_topics
            baseColumnNames: topic_id
            referencedTableName: topics
            referencedColumnNames: id
            constraintName: fk_lit_topic
            onDelete: CASCADE

        - createIndex:
            tableName: learning_item_topics
            indexName: idx_lit_topic
            columns:
              - column:
                  name: topic_id