databaseChangeLog:
  - changeSet:
      id: 003-question-topics
      author: backend
      changes:
        - createTable:
            tableName: question_topics
            columns:
              - column:
                  name: question_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: topic_id
                  type: uuid
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: question_topics
            columnNames: question_id, topic_id

        - addForeignKeyConstraint:
            baseTableName: question_topics
            baseColumnNames: question_id
            referencedTableName: questions
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_question_topics_question

        - addForeignKeyConstraint:
            baseTableName: question_topics
            baseColumnNames: topic_id
            referencedTableName: topics
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_question_topics_topic

# SQL:
# CREATE TABLE question_topics (
#   question_id UUID NOT NULL,
#   topic_id UUID NOT NULL,
#   PRIMARY KEY (question_id, topic_id),
#   CONSTRAINT fk_question_topics_question
#     FOREIGN KEY (question_id) REFERENCES questions(id) ON DELETE CASCADE,
#   CONSTRAINT fk_question_topics_topic
#     FOREIGN KEY (topic_id) REFERENCES topics(id) ON DELETE CASCADE
# );