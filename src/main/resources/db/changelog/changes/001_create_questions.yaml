databaseChangeLog:
  - changeSet:
      id: 001
      author: Dobrenkii Konstantin
      changes:
        - createTable:
            tableName: topics
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
  - changeSet:
      id: 002
      author: Dobrenkii Konstantin
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false