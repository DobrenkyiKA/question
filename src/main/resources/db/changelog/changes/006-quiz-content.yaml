databaseChangeLog:
  - changeSet:
      id: 006-quiz-content
      author: backend
      changes:
        - createTable:
            tableName: quiz_content
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true

        - addForeignKeyConstraint:
            baseTableName: quiz_content
            baseColumnNames: question_id
            referencedTableName: questions
            referencedColumnNames: id
            onDelete: CASCADE
            constraintName: fk_quiz_content_question

# SQL:
# CREATE TABLE quiz_content (
#   id UUID PRIMARY KEY,
#   question_id UUID NOT NULL UNIQUE,
#   CONSTRAINT fk_quiz_content_question
#     FOREIGN KEY (question_id) REFERENCES questions(id) ON DELETE CASCADE
# );